<!DOCTYPE html>
<html>
<head>
    <title>Register - AI Personal Trainer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">💪 AI Personal Trainer</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center fw-bold mb-4">Create Your Profile 🏋️</h3>

                    <form method="POST" action="/register">

                        <div class="mb-3">
                            <label>Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                        </div>

                        <div class="mb-3">
                            <label>Age</label>
                            <input type="number" name="age" class="form-control" placeholder="Enter your age" required>
                        </div>

                        <div class="mb-3">
                            <label>Weight (kg)</label>
                            <input type="number" name="weight" class="form-control" placeholder="Enter your weight" required>
                        </div>

                        <div class="mb-3">
                            <label>Fitness Goal</label>
                            <select name="goal" class="form-control">
                                <option>Lose Weight</option>
                                <option>Build Muscle</option>
                                <option>Stay Fit</option>
                                <option>Increase Stamina</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label>Fitness Level</label>
                            <select name="level" class="form-control">
                                <option>Beginner</option>
                                <option>Intermediate</option>
                                <option>Advanced</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 mt-2">
                            Create My Profile 🚀
                        </button>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
