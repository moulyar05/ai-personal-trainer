<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard — AI Personal Trainer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between">
    <a class="navbar-brand" href="/">💪 AI Personal Trainer</a>
    <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Welcome, {{ user[1] }}! 👋</h2>

    <div class="card shadow mb-4">
        <div class="card-body">
            <h5 class="card-title">Your Profile</h5>
            <p>📧 Email: {{ user[2] }}</p>
            <p>🎂 Age: {{ user[4] }}</p>
            <p>⚖️ Weight: {{ user[5] }} kg</p>
            <p>🎯 Goal: {{ user[6] }}</p>
            <p>💪 Fitness Level: {{ user[7] }}</p>
        </div>
    </div>

    <form method="POST" action="/generate">
        <button type="submit" class="btn btn-dark btn-lg mb-4">🤖 Generate My Workout Plan</button>
    </form>

    {% if workout_plan %}
    <div class="card shadow">
        <div class="card-body">
            <h5 class="card-title">Your Personalized Workout Plan 🏋️</h5>
            <pre style="white-space: pre-wrap;">{{ workout_plan }}</pre>
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
