<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Personal Trainer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">💪 AI Personal Trainer</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center fw-bold mb-4">Welcome Back! 🔥</h3>

                    <form method="POST" action="/login">

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 mt-2">
                            Login 💪
                        </button>

                    </form>

                    <p class="text-center mt-3">Don't have an account? <a href="/register">Register here</a></p>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
